
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.app { padding: 1.5rem 1rem; max-width: 680px; }
.header { text-align: center; margin-bottom: 1.5rem; }
.header h2 { font-size: 20px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.header p { font-size: 13px; color: var(--color-text-secondary); }
.setup-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.setup-card label { font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 6px; }
.room-row { display: flex; gap: 8px; align-items: center; }
.room-row input { flex: 1; font-size: 15px; padding: 8px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.room-row input:focus { border-color: var(--color-border-primary); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border: none; border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.btn-primary:hover { opacity: 0.85; }
.btn-secondary { background: transparent; color: var(--color-text-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 14px; cursor: pointer; white-space: nowrap; }
.btn-secondary:hover { background: var(--color-background-secondary); }
.btn-danger { background: #e24b4a; color: white; border: none; border-radius: var(--border-radius-md); padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-danger:hover { opacity: 0.85; }
.videos { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.video-box { background: #1a1a1a; border-radius: var(--border-radius-lg); overflow: hidden; aspect-ratio: 4/3; position: relative; display: flex; align-items: center; justify-content: center; }
.video-box video { width: 100%; height: 100%; object-fit: cover; }
.video-label { position: absolute; bottom: 8px; left: 10px; font-size: 12px; color: white; background: rgba(0,0,0,0.5); padding: 2px 8px; border-radius: 20px; }
.video-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.video-placeholder .icon { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; }
.video-placeholder p { font-size: 12px; color: rgba(255,255,255,0.5); }
.controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 1rem; }
.status-bar { text-align: center; font-size: 13px; padding: 8px; border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); margin-bottom: 1rem; }
.status-bar.connected { color: #1D9E75; background: #E1F5EE; }
.status-bar.error { color: #a32d2d; background: #FCEBEB; }
.chat-section { border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
.chat-messages { height: 150px; overflow-y: auto; padding: 10px; background: var(--color-background-secondary); display: flex; flex-direction: column; gap: 6px; }
.chat-msg { font-size: 13px; padding: 5px 10px; border-radius: 12px; max-width: 85%; }
.chat-msg.me { background: var(--color-text-primary); color: var(--color-background-primary); align-self: flex-end; }
.chat-msg.them { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); align-self: flex-start; }
.chat-msg .who { font-size: 11px; opacity: 0.6; margin-bottom: 2px; }
.chat-input-row { display: flex; gap: 0; border-top: 0.5px solid var(--color-border-tertiary); }
.chat-input-row input { flex: 1; border: none; padding: 10px 12px; font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
.chat-input-row button { padding: 10px 14px; background: var(--color-text-primary); color: var(--color-background-primary); border: none; cursor: pointer; font-size: 14px; }
.hidden { display: none !important; }
.info-note { font-size: 12px; color: var(--color-text-secondary); text-align: center; margin-top: 6px; }
.toggle-btn { padding: 8px 14px; font-size: 13px; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-primary); }
.toggle-btn.off { background: var(--color-background-secondary); color: var(--color-text-secondary); text-decoration: line-through; opacity: 0.6; }
</style>

<div class="app">
  <div class="header">
    <h2>Görüntülü Arama</h2>
    <p>Arkadaşınla gerçek zamanlı görüntülü konuş</p>
  </div>

  <div id="setupSection">
    <div class="setup-card">
      <label>Adın</label>
      <input type="text" id="nameInput" placeholder="Adını gir..." style="width:100%;margin-bottom:12px;" />
      <label>Oda Kodu <span style="color:var(--color-text-secondary);font-weight:400;">(arkadaşınla aynı kodu girin)</span></label>
      <div class="room-row">
        <input type="text" id="roomInput" placeholder="oda-kodu-gir" />
        <button class="btn-secondary" onclick="generateRoom()">Rastgele</button>
        <button class="btn-primary" onclick="joinRoom()">Katıl</button>
      </div>
    </div>
    <p class="info-note">İki kişi de aynı oda kodunu girince otomatik bağlanır</p>
  </div>

  <div id="callSection" class="hidden">
    <div id="statusBar" class="status-bar">Kameraya erişiliyor...</div>

    <div class="videos">
      <div class="video-box">
        <video id="localVideo" autoplay muted playsinline></video>
        <div id="localPlaceholder" class="video-placeholder">
          <div class="icon">👤</div>
          <p>Kamera kapalı</p>
        </div>
        <div class="video-label" id="localLabel">Sen</div>
      </div>
      <div class="video-box">
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="remotePlaceholder" class="video-placeholder">
          <div class="icon">👤</div>
          <p>Bekleniyor...</p>
        </div>
        <div class="video-label" id="remoteLabel">Arkadaş</div>
      </div>
    </div>

    <div class="controls">
      <button class="toggle-btn" id="camBtn" onclick="toggleCam()">📷 Kamera</button>
      <button class="toggle-btn" id="micBtn" onclick="toggleMic()">🎙 Mikrofon</button>
      <button class="btn-danger" onclick="endCall()">✕ Kapat</button>
    </div>

    <div class="chat-section">
      <div class="chat-messages" id="chatMessages">
        <div style="text-align:center;font-size:12px;color:var(--color-text-secondary);padding:8px;">Mesajlar burada görünecek</div>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Mesaj yaz..." onkeydown="if(event.key==='Enter')sendChat()" />
        <button onclick="sendChat()">&#10148;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.1/peerjs.min.js"></script>
<script>
let peer, currentCall, localStream, dataConn;
let camOn = true, micOn = true;
let myName = '', roomCode = '', isHost = false;

function generateRoom() {
  const r = Math.random().toString(36).substr(2, 6).toUpperCase();
  document.getElementById('roomInput').value = r;
}

function setStatus(msg, type='') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar' + (type ? ' ' + type : '');
}

async function joinRoom() {
  myName = document.getElementById('nameInput').value.trim() || 'Sen';
  roomCode = document.getElementById('roomInput').value.trim().toUpperCase();
  if (!roomCode) { alert('Oda kodu gir!'); return; }

  document.getElementById('setupSection').classList.add('hidden');
  document.getElementById('callSection').classList.remove('hidden');
  document.getElementById('localLabel').textContent = myName;
  setStatus('Kameraya erişiliyor...');

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    const lv = document.getElementById('localVideo');
    lv.srcObject = localStream;
    document.getElementById('localPlaceholder').style.display = 'none';
    setStatus('Bağlanmaya çalışılıyor...');
    initPeer();
  } catch(e) {
    setStatus('Kamera/mikrofon erişimi reddedildi. Lütfen izin ver.', 'error');
    setTimeout(() => {
      setStatus('Demo modu: gerçek bağlantı yok ama arayüzü test edebilirsin');
      document.getElementById('localPlaceholder').style.display = 'none';
      initPeerNoMedia();
    }, 2000);
  }
}

function initPeer() {
  const hostId = 'vc-room-' + roomCode + '-host';
  const guestId = 'vc-room-' + roomCode + '-guest-' + Date.now();

  peer = new Peer(hostId, { debug: 0 });

  peer.on('open', () => {
    isHost = true;
    setStatus('Oda oluşturuldu. Arkadaşın katılması bekleniyor...');
    peer.on('call', (call) => {
      call.answer(localStream);
      handleCall(call);
    });
    peer.on('connection', (conn) => {
      dataConn = conn;
      setupDataConn();
    });
  });

  peer.on('error', (err) => {
    if (err.type === 'unavailable-id') {
      peer.destroy();
      joinAsGuest(hostId);
    } else {
      setStatus('Bağlantı hatası: ' + err.message, 'error');
    }
  });
}

function joinAsGuest(hostId) {
  const guestId = 'vc-guest-' + Date.now();
  peer = new Peer(guestId, { debug: 0 });
  peer.on('open', () => {
    setStatus('Odaya katılıyorsun...');
    const call = peer.call(hostId, localStream);
    handleCall(call);
    const conn = peer.connect(hostId);
    dataConn = conn;
    setupDataConn();
  });
  peer.on('error', (e) => setStatus('Bağlanamadı: ' + e.message, 'error'));
}

function initPeerNoMedia() {
  peer = new Peer('vc-room-' + roomCode + '-host', { debug: 0 });
  peer.on('open', () => setStatus('Demo: oda hazır (gerçek bağlantı için kamera izni gerek)'));
  peer.on('error', () => setStatus('Demo modu aktif'));
}

function handleCall(call) {
  currentCall = call;
  call.on('stream', (remoteStream) => {
    const rv = document.getElementById('remoteVideo');
    rv.srcObject = remoteStream;
    document.getElementById('remotePlaceholder').style.display = 'none';
    setStatus('Bağlandı!', 'connected');
    if (call.peer) {
      document.getElementById('remoteLabel').textContent = 'Arkadaş';
    }
  });
  call.on('close', () => {
    setStatus('Bağlantı kesildi.', 'error');
    document.getElementById('remotePlaceholder').style.display = 'flex';
    document.getElementById('remoteVideo').srcObject = null;
  });
  call.on('error', () => setStatus('Arama hatası oluştu.', 'error'));
}

function setupDataConn() {
  dataConn.on('open', () => {
    dataConn.send(JSON.stringify({ type: 'name', name: myName }));
  });
  dataConn.on('data', (raw) => {
    try {
      const d = JSON.parse(raw);
      if (d.type === 'name') {
        document.getElementById('remoteLabel').textContent = d.name;
      } else if (d.type === 'chat') {
        addChatMsg(d.name, d.text, false);
      }
    } catch(e) {}
  });
}

function toggleCam() {
  camOn = !camOn;
  if (localStream) {
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  }
  const btn = document.getElementById('camBtn');
  btn.className = 'toggle-btn' + (camOn ? '' : ' off');
  btn.textContent = '📷 Kamera';
}

function toggleMic() {
  micOn = !micOn;
  if (localStream) {
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  }
  const btn = document.getElementById('micBtn');
  btn.className = 'toggle-btn' + (micOn ? '' : ' off');
  btn.textContent = '🎙 Mikrofon';
}

function endCall() {
  if (currentCall) currentCall.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (peer) peer.destroy();
  document.getElementById('callSection').classList.add('hidden');
  document.getElementById('setupSection').classList.remove('hidden');
  document.getElementById('localVideo').srcObject = null;
  document.getElementById('remoteVideo').srcObject = null;
  document.getElementById('localPlaceholder').style.display = 'flex';
  document.getElementById('remotePlaceholder').style.display = 'flex';
  document.getElementById('chatMessages').innerHTML = '<div style="text-align:center;font-size:12px;color:var(--color-text-secondary);padding:8px;">Mesajlar burada görünecek</div>';
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const txt = inp.value.trim();
  if (!txt) return;
  addChatMsg(myName, txt, true);
  if (dataConn && dataConn.open) {
    dataConn.send(JSON.stringify({ type: 'chat', name: myName, text: txt }));
  }
  inp.value = '';
}

function addChatMsg(name, text, isMe) {
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + (isMe ? 'me' : 'them');
  div.innerHTML = '<div class="who">' + name + '</div>' + text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
